<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PPTK - Windows 2000 Pixel-Perfect (Bitmap MS Sans Serif)</title>
    <style>
        /* █████████████████████████████████████████████████████████████
           КАНОНИЧЕСКИЕ ИМЕНА ЭЛЕМЕНТОВ WINDOWS 2000
           Метрики шрифта доступны через JS-объект fontMetrics.
           Текст меню отрисовывается на canvas вручную (пиксельный режим).
        █████████████████████████████████████████████████████████████ */
        :root {
            /* ---- МАСШТАБ ---- */
            --zoom-factor: 1;              /* целое число для чёткого пиксельного масштаба */

            /* ---- ОБЩАЯ ГЕОМЕТРИЯ ---- */
            --line-size: 1px;              /* толщина всех линий обводки */
            --inset: 1px;                  /* отступ внутренних линий от края */

            /* ---- ЦВЕТА (Win2000 Classic) ---- */
            --color-white: #ffffff;        /* яркий блик (w) */
            --color-gray: #D4D0C8;         /* фон поверхности (g) */
            --color-dark: #808080;         /* внутренняя тень (d) */
            --color-black: #404040;        /* внешняя тень / тень окна (b) */
            --color-title-start: #0a246a;  /* левая часть градиента заголовка */
            --color-title-end: #a6caf0;    /* правая часть градиента заголовка */
            --color-menu-text: #000000;    /* текст меню */
            --color-desktop: #3a6ea5;      /* фон рабочего стола */

            /* ---- РАЗМЕРЫ ОКНА (базовое тело, без заголовка) ---- */
            --window-w: 256px;               /* ширина окна */
            --window-h: 96px;               /* высота окна (без заголовка) */

            /* ---- ЗАГОЛОВОК И МЕНЮ ---- */
            --caption-h: 12px;              /* общая высота полосы заголовка */
            --titlebar-h: 18px;             /* высота градиентной полосы заголовка */
            --titlebar-offset: 2px;         /* базовый отступ градиента от краёв */
            --menu-h: 10px;                 /* высота строки меню */

            /* ---- КНОПКА ---- */
            --button-w: 64px;
            --button-h: 24px;

            /* ---- ШРИФТЫ (только для canvas, CSS не используется для текста меню) ---- */
            --font-family: "MS Sans Serif", "Microsoft Sans Serif", Tahoma, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--color-desktop);
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            overflow: auto;
        }

        /* контейнер масштабирования */
        .viewport-scale {
            transform: scale(var(--zoom-factor));
            transform-origin: top left;
        }

        /* контейнер для элементов — строго без отступов */
        .desktop {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 0;
            margin: 0;
            padding: 0;
        }

        /* вспомогательный класс для линий */
        .line {
            position: absolute;
            shape-rendering: crispedges;
            z-index: 20;
        }
        .light { background: var(--color-white); }
        .shadow-inner { background: var(--color-dark); }
        .shadow-outer { background: var(--color-black); }

        /* █████████████████████████████████████████████████████████████
           WINDOW (чистое окно без заголовка)
        █████████████████████████████████████████████████████████████ */
        .window {
            position: relative;
            width: var(--window-w);
            height: var(--window-h);
            background-color: var(--color-gray);
            flex-shrink: 0;
        }

        .window .top-light { left: var(--inset); top: var(--inset); width: calc(100% - calc(var(--inset) * 2)); height: var(--line-size); }
        .window .left-light { left: var(--inset); top: var(--inset); width: var(--line-size); height: calc(100% - calc(var(--inset) * 2)); }
        .window .right-shadow { right: var(--inset); top: var(--inset); width: var(--line-size); height: calc(100% - calc(var(--inset) * 2)); }
        .window .bottom-shadow { left: var(--inset); bottom: var(--inset); width: calc(100% - calc(var(--inset) * 2)); height: var(--line-size); }
        .window .right-outer { right: 0; top: 0; width: var(--line-size); height: 100%; }
        .window .bottom-outer { left: 0; bottom: 0; width: 100%; height: var(--line-size); }

        /* █████████████████████████████████████████████████████████████
           WINDOW with CAPTION AND MENU (честная сумма, без искусственных отступов)
        █████████████████████████████████████████████████████████████ */
        .window.caption-menu {
            height: calc(var(--window-h) + var(--caption-h) + var(--menu-h));
        }

        .caption-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--caption-h);
            z-index: 10;
        }

        /* градиентная область смещена на 1px вниз и урезана слева/справа на 1px */
        .titlebar {
            position: absolute;
            top: calc(var(--titlebar-offset) + 1px);
            left: calc(var(--titlebar-offset) + 1px);
            right: calc(var(--titlebar-offset) + 1px);
            height: var(--titlebar-h);
            background: linear-gradient(to right, var(--color-title-start), var(--color-title-end));
        }

        /* меню – контейнер, логично расположен сразу под заголовком */
        .menu-bar {
            position: absolute;
            top: var(--caption-h);
            left: var(--inset);
            right: var(--inset);
            height: var(--menu-h);
            display: flex;
            align-items: center;
            padding: 0 1px;
            z-index: 5;
            background-color: var(--color-gray);
            gap: 0;
        }

        .menu-item-canvas {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            user-select: none;
        }

        /* █████████████████████████████████████████████████████████████
           BUTTON
        █████████████████████████████████████████████████████████████ */
        .button {
            position: relative;
            width: var(--button-w);
            height: var(--button-h);
            background-color: var(--color-gray);
            flex-shrink: 0;
        }

        .button .top-light { left: 0; top: 0; width: 100%; height: var(--line-size); }
        .button .left-light { left: 0; top: 0; width: var(--line-size); height: 100%; }
        .button .right-shadow { right: 1px; top: 1px; width: var(--line-size); height: calc(100% - 2px); }
        .button .bottom-shadow { left: 1px; bottom: 1px; width: calc(100% - 2px); height: var(--line-size); }
        .button .right-outer { right: 0; top: 0; width: var(--line-size); height: 100%; }
        .button .bottom-outer { left: 0; bottom: 0; width: 100%; height: var(--line-size); }
    </style>
</head>
<body>
    <div class="viewport-scale">
        <div class="desktop">
            <!-- Базовое окно 256×96 -->
            <div class="window">
                <div class="line light top-light"></div>
                <div class="line light left-light"></div>
                <div class="line shadow-inner right-shadow"></div>
                <div class="line shadow-inner bottom-shadow"></div>
                <div class="line shadow-outer right-outer"></div>
                <div class="line shadow-outer bottom-outer"></div>
            </div>

            <!-- Окно с заголовком и меню (без искусственных отступов) -->
            <div class="window caption-menu" id="windowWithMenu">
                <div class="line light top-light"></div>
                <div class="line light left-light"></div>
                <div class="line shadow-inner right-shadow"></div>
                <div class="line shadow-inner bottom-shadow"></div>
                <div class="line shadow-outer right-outer"></div>
                <div class="line shadow-outer bottom-outer"></div>

                <div class="caption-area">
                    <div class="titlebar"></div>
                </div>

                <div class="menu-bar" id="menuBar">
                    <!-- Canvas‑текст меню создаётся скриптом -->
                </div>
            </div>

            <!-- Кнопка 64×24 -->
            <div class="button">
                <div class="line light top-light"></div>
                <div class="line light left-light"></div>
                <div class="line shadow-inner right-shadow"></div>
                <div class="line shadow-inner bottom-shadow"></div>
                <div class="line shadow-outer right-outer"></div>
                <div class="line shadow-outer bottom-outer"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------------------------------------------------------
            //  РАСТРОВЫЙ РЕНДЕРИНГ ТЕКСТА (PIXEL-PERFECT BITMAP)
            //  Используем canvas с отключённым сглаживанием и шрифт MS Sans Serif.
            // ------------------------------------------------------------------
            const FONT_STRING = '11px "MS Sans Serif", "Microsoft Sans Serif", Tahoma';

            // Получение метрик шрифта (доступны для модели)
            function getFontMetrics() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = FONT_STRING;

                const metrics = {
                    fontFamily: 'MS Sans Serif',
                    fontSize: 11,
                    fontString: FONT_STRING,
                    baseline: 'top',
                    height: 0,
                    charWidths: {},
                    fullTextSample: null
                };

                const textSample = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                ctx.textBaseline = 'top';
                const textMetrics = ctx.measureText(textSample);
                metrics.height = Math.ceil(textMetrics.actualBoundingBoxAscent + textMetrics.actualBoundingBoxDescent) || 12;
                if (metrics.height < 10) metrics.height = 11;

                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{};:,.<>/?\\|`~ ';
                for (const ch of chars) {
                    const w = ctx.measureText(ch).width;
                    metrics.charWidths[ch] = Math.ceil(w);
                }
                metrics.charWidths.space = metrics.charWidths[' '] || 3;
                metrics.ascent = textMetrics.actualBoundingBoxAscent || 8;
                metrics.descent = textMetrics.actualBoundingBoxDescent || 3;

                return metrics;
            }

            // Рендеринг строки в canvas (пиксельный, без сглаживания)
            function renderTextToCanvas(text, bgColor, textColor) {
                const metrics = getFontMetrics();
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.font = FONT_STRING;
                ctx.textBaseline = 'top';
                const width = Math.ceil(ctx.measureText(text).width);
                const height = metrics.height;
                canvas.width = width;
                canvas.height = height;

                const ctx2 = canvas.getContext('2d');
                ctx2.imageSmoothingEnabled = false;
                ctx2.font = FONT_STRING;
                ctx2.textBaseline = 'top';
                ctx2.fillStyle = bgColor;
                ctx2.fillRect(0, 0, width, height);
                ctx2.fillStyle = textColor;
                ctx2.fillText(text, 0, 0);

                return canvas;
            }

            // Замена текстовых элементов меню на canvas (bitmap)
            const menuItems = [
                { name: 'File', color: '#000000' },
                { name: 'Edit', color: '#000000' },
                { name: 'View', color: '#000000' },
                { name: 'Tools', color: '#000000' },
                { name: 'Help', color: '#000000' }
            ];

            const menuBar = document.getElementById('menuBar');
            if (menuBar) {
                menuBar.innerHTML = '';
                menuItems.forEach((item) => {
                    const canvasNode = renderTextToCanvas(item.name, 'transparent', item.color);
                    const wrapper = document.createElement('div');
                    wrapper.className = 'menu-item-canvas';
                    wrapper.style.padding = '0 2px';
                    wrapper.style.display = 'inline-flex';
                    wrapper.style.alignItems = 'center';
                    wrapper.style.height = '100%';
                    wrapper.appendChild(canvasNode);
                    menuBar.appendChild(wrapper);
                });
            }

            // ------------------------------------------------------------------
            //  ВЫВОД ВСЕХ МЕТРИК (включая шрифтовые) ДЛЯ ИИ-МОДЕЛИ
            // ------------------------------------------------------------------
            const root = document.documentElement;
            const styles = getComputedStyle(root);
            function getVar(name) { return styles.getPropertyValue(name).trim(); }

            const fontMetrics = getFontMetrics();

            const metrics = {
                '--zoom-factor': getVar('--zoom-factor'),
                '--line-size': getVar('--line-size'),
                '--inset': getVar('--inset'),
                '--color-white': getVar('--color-white'),
                '--color-gray': getVar('--color-gray'),
                '--color-dark': getVar('--color-dark'),
                '--color-black': getVar('--color-black'),
                '--color-title-start': getVar('--color-title-start'),
                '--color-title-end': getVar('--color-title-end'),
                '--color-menu-text': getVar('--color-menu-text'),
                '--color-desktop': getVar('--color-desktop'),
                '--window-w': getVar('--window-w'),
                '--window-h': getVar('--window-h'),
                '--caption-h': getVar('--caption-h'),
                '--titlebar-h': getVar('--titlebar-h'),
                '--titlebar-offset': getVar('--titlebar-offset'),
                '--menu-h': getVar('--menu-h'),
                '--button-w': getVar('--button-w'),
                '--button-h': getVar('--button-h'),
                fontFamily: fontMetrics.fontFamily,
                fontSize: `${fontMetrics.fontSize}px`,
                fontString: fontMetrics.fontString,
                charHeight: `${fontMetrics.height}px`,
                ascent: `${fontMetrics.ascent || 8}px`,
                descent: `${fontMetrics.descent || 3}px`,
                sampleCharWidths: {
                    H: `${fontMetrics.charWidths.H || 7}px`,
                    W: `${fontMetrics.charWidths.W || 9}px`,
                    i: `${fontMetrics.charWidths.i || 3}px`,
                    space: `${fontMetrics.charWidths.space || 3}px`
                }
            };

            console.group(`📐 PPTK — Windows 2000 Native Metrics (окно 256×96, масштаб ${metrics['--zoom-factor']})`);
            Object.entries(metrics).forEach(([key, val]) => {
                if (typeof val === 'object') {
                    console.log(`${key.padEnd(24)} →`, val);
                } else {
                    console.log(`${key.padEnd(24)} → ${val}`);
                }
            });
            console.groupEnd();

            const metaBlock = document.createElement('div');
            metaBlock.style.display = 'none';
            metaBlock.id = 'pptk-windows2000-metrics';
            metaBlock.textContent = JSON.stringify(metrics, null, 2);
            document.body.appendChild(metaBlock);
            window.pptkFontMetrics = fontMetrics;
        })();
    </script>
</body>
</html>
